name: Build & Deploy

# Builds the container image, publishes it to GHCR, and (optionally) rolls out
# the new image to the sentio-sea cluster. Replaces the previous Azure App
# Service pipeline — the service now runs on Kubernetes (chore namespace).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/sentioxyz/changelogue

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA::12}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE}:latest,${SHA_TAG}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Make the package public so the cluster can pull without per-pod creds.
      # Best-effort: ignored if already public or insufficient permissions.
      - name: Ensure package is public
        continue-on-error: true
        run: |
          gh api --method PATCH -H "Accept: application/vnd.github+json" \
            "/orgs/sentioxyz/packages/container/changelogue/visibility" \
            -f visibility=public || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollout:
    name: Roll out to sentio-sea
    needs: image
    runs-on: ubuntu-latest
    # Requires a base64-encoded kubeconfig in the KUBE_CONFIG_SEA secret.
    # If the secret is not configured the job is skipped (image is still
    # published, and the next helmfile sync of the production repo picks it up).
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Roll out new image
        env:
          KUBE_CONFIG_SEA: ${{ secrets.KUBE_CONFIG_SEA }}
        run: |
          if [[ -z "${KUBE_CONFIG_SEA}" ]]; then
            echo "KUBE_CONFIG_SEA not set — skipping in-cluster rollout."
            echo "Image ${{ needs.image.outputs.sha_tag }} is published; deploy via the production repo (helmfile)."
            exit 0
          fi
          echo "${KUBE_CONFIG_SEA}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl -n chore set image deploy/changelogue changelogue=${{ needs.image.outputs.sha_tag }}
          kubectl -n chore rollout status deploy/changelogue --timeout=300s
